name: External cron — watch renew

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: cron-watch-renew
  cancel-in-progress: false

jobs:
  watch-renew:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Renew Gmail watches
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: bash .github/scripts/cron-trigger.sh /api/cron/gmail-watch-renew

      - name: Renew Outlook subscriptions
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: bash .github/scripts/cron-trigger.sh /api/cron/outlook-renew
