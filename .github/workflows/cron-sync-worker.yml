name: External cron — sync worker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: cron-sync-worker
  cancel-in-progress: false

jobs:
  sync-worker:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger sync worker
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.API_BASE_URL }}/api/cron/sync-worker"
